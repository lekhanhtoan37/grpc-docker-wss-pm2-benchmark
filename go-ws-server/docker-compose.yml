services:
  go-ws-1:
    build: .
    environment:
      CONTAINER_ID: "bridge-1"
      KAFKA_BROKER: "192.168.0.9:9091"
      KAFKA_TOPIC: "benchmark-messages"
      PORT: "8092"
    networks:
      - backend

  go-ws-2:
    build: .
    environment:
      CONTAINER_ID: "bridge-2"
      KAFKA_BROKER: "192.168.0.9:9091"
      KAFKA_TOPIC: "benchmark-messages"
      PORT: "8092"
    networks:
      - backend

  go-ws-3:
    build: .
    environment:
      CONTAINER_ID: "bridge-3"
      KAFKA_BROKER: "192.168.0.9:9091"
      KAFKA_TOPIC: "benchmark-messages"
      PORT: "8092"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "50071:50071"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - go-ws-1
      - go-ws-2
      - go-ws-3
    networks:
      - backend

networks:
  backend:
