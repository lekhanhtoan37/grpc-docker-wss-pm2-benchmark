services:
  grpc-server-1:
    build: .
    container_name: grpc-server-1
    environment:
      CONTAINER_ID: "1"
      KAFKA_BROKER: "host.docker.internal:9092"
      KAFKA_TOPIC: "benchmark-messages"
    ports:
      - "50051:50051"
    networks:
      - grpc-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grpc-server-2:
    build: .
    container_name: grpc-server-2
    environment:
      CONTAINER_ID: "2"
      KAFKA_BROKER: "host.docker.internal:9092"
      KAFKA_TOPIC: "benchmark-messages"
    ports:
      - "50052:50051"
    networks:
      - grpc-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grpc-server-3:
    build: .
    container_name: grpc-server-3
    environment:
      CONTAINER_ID: "3"
      KAFKA_BROKER: "host.docker.internal:9092"
      KAFKA_TOPIC: "benchmark-messages"
    ports:
      - "50053:50051"
    networks:
      - grpc-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  grpc-net:
    driver: bridge
