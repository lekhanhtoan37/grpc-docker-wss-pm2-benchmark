syntax = "proto3";
package benchmark;

option go_package = "github.com/benchmark-client/proto";

service BenchmarkService {
  rpc StreamMessages(StreamRequest) returns (stream StreamResponse);
}

message StreamRequest {
  string client_id = 1;
}

message StreamResponse {
  uint64 timestamp = 1;
  uint64 seq = 2;
  bytes payload = 3;
}
