syntax = "proto3";
package benchmark;

service BenchmarkService {
  rpc StreamMessages(StreamRequest) returns (stream StreamResponse);
}

message StreamRequest {
  string client_id = 1;
}

message MessageEntry {
  uint64 timestamp = 1;
  uint64 seq = 2;
  bytes payload = 3;
}

message StreamResponse {
  repeated MessageEntry messages = 1;
}
